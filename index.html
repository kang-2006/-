<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI千年诗词 - 主页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main-container">
    <div class="main-header">
      <h1>AI千年诗词</h1>
      <p>品千年古韵 与文豪相逢</p >
    </div>
    <div class="func-list">
      <!-- 第一个功能：千古诗人AI对话 -->
      <div class="func-card" onclick="window.location.href='poetSelect.html'">
        <div class="func-icon">谈</div>
        <div class=“func-text”>千古诗人AI对话</div>
        <div class=“func-desc”>穿越古今，和李白杜甫苏轼一众文豪随心畅谈</div>
      </div>
      <!-- 第二个功能：诗文译文与赏析 -->
      <div class="func-card" onclick="window.location.href='appreciationIndex.html'">
        <div class="func-icon">译</div>
        <div class=“func-text”>诗文译文与赏析</div>
        <div class=“func-desc”>全文白话翻译，逐句深度解读诗词背后故事心境</div>
      </div>
      <!-- 第三个功能：诗词题库随心生成 完整可点击跳转版本 -->
      <div class="func-card" onclick="window.location.href='examStart.html'">
        <div class="func-icon">练</div>
        <div class=“func-text”>诗词题库随心生成</div>
        <div class=“func-desc”>定制专属诗词考题，趣味答题巩固诗词积累</div>
      </div>
    </div>
  </div>
</body>
</html>
